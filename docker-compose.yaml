#TODO Handle ENVS
services:
  frontend:
    build: ./frontend/
    env_file: ./frontend/.env
    # ports:
      # - "${FRONTEND_PORT}:80"
    networks:
      - app-network
  
  backend:
    build: ./backend/
    env_file: ./backend/.env
    # ports:
    #   - "${BACKEND_PORT}:8000"
    networks:
      - app-network
  
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
       - "80:80"
       - "443:443"
    depends_on:
      - frontend
      - backend
    volumes:
       - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
       - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - app-network

networks: 
   app-network:
      driver: bridge