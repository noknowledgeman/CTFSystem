<VirtualHost *:8080>
    DocumentRoot /app

    <Directory /app>
        Options Indexes FollowSymLinks
        AllowOverride None
        
        # --- AUTHENTICATION CONFIG ---
        AuthType Basic
        AuthName "Restricted Flag Area"
        AuthUserFile /etc/apache2/.htpasswd
        Require valid-user
        # -----------------------------
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>